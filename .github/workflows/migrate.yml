name: 🗄️ Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]
      action:
        description: 'Action to run'
        required: true
        default: 'migrate'
        type: choice
        options: [migrate, seed, migrate-and-seed]

jobs:
  run-migration:
    name: Run ${{ github.event.inputs.action }} on ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run migration
        if: contains(github.event.inputs.action, 'migrate')
        working-directory: backend
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: ${{ github.event.inputs.environment }}

      - name: Run seed
        if: contains(github.event.inputs.action, 'seed')
        working-directory: backend
        run: npm run db:seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: ${{ github.event.inputs.environment }}

      - name: Summary
        run: |
          echo "## ✅ Database ${{ github.event.inputs.action }} selesai!" >> $GITHUB_STEP_SUMMARY
          echo "Environment: **${{ github.event.inputs.environment }}**" >> $GITHUB_STEP_SUMMARY
          echo "Action: **${{ github.event.inputs.action }}**" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: **${{ github.actor }}**" >> $GITHUB_STEP_SUMMARY
