name: "🚀 CI/CD — SIAPA AKU"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:

  lint-frontend:
    name: "🔍 Lint Frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-placeholder-secret-minimum-32-chars!!
          GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: placeholder
          NEXT_PUBLIC_API_URL: http://localhost:4000
      - run: npm run lint --if-present
        working-directory: frontend

  lint-backend:
    name: "🔍 Lint Backend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx tsc --noEmit
        working-directory: backend

  build-frontend:
    name: "🏗️ Build Frontend"
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          NEXTAUTH_URL: "${{ secrets.NEXTAUTH_URL }}"
          NEXTAUTH_SECRET: "${{ secrets.NEXTAUTH_SECRET }}"
          GOOGLE_CLIENT_ID: "${{ secrets.GOOGLE_CLIENT_ID }}"
          GOOGLE_CLIENT_SECRET: "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          NEXT_PUBLIC_API_URL: "${{ secrets.NEXT_PUBLIC_API_URL }}"

  build-backend:
    name: "🏗️ Build Backend"
    runs-on: ubuntu-latest
    needs: [lint-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm run build
        working-directory: backend

  deploy-preview:
    name: "🔮 Preview Deploy (PR)"
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: "github.event_name == 'pull_request'"
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm install -g vercel@latest
      - name: Deploy preview
        id: preview
        working-directory: frontend
        env:
          VERCEL_ORG_ID: "${{ secrets.VERCEL_ORG_ID }}"
          VERCEL_PROJECT_ID: "${{ secrets.VERCEL_PROJECT_ID }}"
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔮 Preview Siap!\n\n**URL:** ${url}\n\n| Halaman | |\n|---|---|\n| Home | [Buka](${url}) |\n| Tes MBTI | [Buka](${url}/test) |\n| Profile | [Buka](${url}/profile) |\n| Shop | [Buka](${url}/shop) |`
            });

  deploy-frontend:
    name: "🌐 Deploy → Vercel"
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: "github.ref == 'refs/heads/main' && github.event_name == 'push'"
    environment:
      name: production
      url: https://siapaku.id
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm install -g vercel@latest
      - name: Deploy production
        id: deploy
        working-directory: frontend
        env:
          VERCEL_ORG_ID: "${{ secrets.VERCEL_ORG_ID }}"
          VERCEL_PROJECT_ID: "${{ secrets.VERCEL_PROJECT_ID }}"
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to $url"
      - name: Summary
        run: |
          echo "## ✅ Frontend Live!" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| By | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  deploy-backend:
    name: "🛠️ Deploy → Railway"
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: "github.ref == 'refs/heads/main' && github.event_name == 'push'"
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - name: Deploy
        run: railway up --service siapaku-backend --detach
        working-directory: backend
        env:
          RAILWAY_TOKEN: "${{ secrets.RAILWAY_TOKEN }}"
      - name: Summary
        run: |
          echo "## ✅ Backend Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
