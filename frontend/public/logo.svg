<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <defs>
    <radialGradient id="ballGrad" cx="0.45" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="30%" stop-color="#a78bfa"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="0.35" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="swirlGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="40%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="baseHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rimGlow" cx="0.5" cy="0" r="0.6">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ballClip">
      <circle cx="60" cy="58" r="42"/>
    </clipPath>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Ball shadow -->
  <ellipse cx="60" cy="110" rx="36" ry="6" fill="#1e1b4b" opacity="0.4" filter="url(#softGlow)"/>

  <!-- Wooden base -->
  <ellipse cx="60" cy="105" rx="28" ry="10" fill="url(#baseGrad)"/>
  <ellipse cx="60" cy="103" rx="26" ry="8" fill="url(#baseHighlight)"/>
  <path d="M34 105 C34 100, 40 94, 60 94 C80 94, 86 100, 86 105 C86 112, 80 116, 60 116 C40 116, 34 112, 34 105Z" fill="url(#baseGrad)"/>
  <ellipse cx="60" cy="105" rx="26" ry="8" fill="url(#rimGlow)"/>
  <!-- Base wood grain lines -->
  <path d="M38 108 Q50 106, 60 107 Q70 108, 82 106" stroke="#92400e" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M40 111 Q52 109, 60 110 Q68 111, 80 109" stroke="#92400e" stroke-width="0.4" fill="none" opacity="0.3"/>

  <!-- Crystal ball -->
  <circle cx="60" cy="58" r="42" fill="url(#ballGrad)"/>
  <circle cx="60" cy="58" r="42" fill="url(#innerGlow)"/>

  <!-- Swirl effects inside ball -->
  <g clip-path="url(#ballClip)">
    <!-- Purple/pink swirl -->
    <path d="M30 80 Q35 60, 45 50 Q55 40, 50 30 Q45 20, 55 18" stroke="url(#swirlGrad)" stroke-width="14" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M35 85 Q42 65, 50 55 Q58 45, 52 32" stroke="#c084fc" stroke-width="8" fill="none" opacity="0.3" stroke-linecap="round"/>
    <!-- Blue swirl -->
    <path d="M55 90 Q60 70, 70 55 Q80 40, 75 25" stroke="#818cf8" stroke-width="10" fill="none" opacity="0.35" stroke-linecap="round"/>
    <path d="M60 92 Q65 75, 72 60 Q79 45, 78 30" stroke="#6366f1" stroke-width="6" fill="none" opacity="0.25" stroke-linecap="round"/>
  </g>

  <!-- Sparkle stars -->
  <!-- Star 1 (larger) -->
  <g transform="translate(72, 45)">
    <path d="M0,-8 L1.5,-1.5 L8,0 L1.5,1.5 L0,8 L-1.5,1.5 L-8,0 L-1.5,-1.5 Z" fill="white" opacity="0.95">
      <animate attributeName="opacity" values="0.95;0.6;0.95" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Star 2 (smaller) -->
  <g transform="translate(78, 62)">
    <path d="M0,-5 L1,-1 L5,0 L1,1 L0,5 L-1,1 L-5,0 L-1,-1 Z" fill="white" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.5;0.85" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Star 3 (tiny) -->
  <g transform="translate(65, 35)">
    <path d="M0,-3 L0.6,-0.6 L3,0 L0.6,0.6 L0,3 L-0.6,0.6 L-3,0 L-0.6,-0.6 Z" fill="white" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.35;0.7" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Glass reflection (highlight arc) -->
  <path d="M38 38 Q45 26, 58 24 Q68 22, 75 28" stroke="white" stroke-width="3.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M42 42 Q48 34, 55 32" stroke="white" stroke-width="2" fill="none" opacity="0.2" stroke-linecap="round"/>

  <!-- Subtle rim light -->
  <circle cx="60" cy="58" r="41" stroke="white" stroke-width="0.5" fill="none" opacity="0.1"/>
  <circle cx="60" cy="58" r="42" stroke="#7c3aed" stroke-width="0.8" fill="none" opacity="0.15"/>
</svg>